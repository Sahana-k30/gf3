<!DOCTYPE html>
<html>
<head>
  <title>Semantic-Aware Adaptive GF(3) Communication</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root{ --bg:#0f172a; --card:#0b1220; --muted:#9aa4b2; --accent:#06b6d4 }
    html,body{ height:100%; }
    body{
      margin:0; min-height:100%; font-family:Inter,Segoe UI,Arial,sans-serif; background: linear-gradient(180deg,#071029 0%, #061829 100%); color:#e6eef6; padding:28px; box-sizing:border-box;
    }
    .panel{ max-width:1000px; margin:0 auto; }
    .controls{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:18px }
    input[type=text], input[type=number]{ background:transparent; border:1px solid rgba(255,255,255,0.08); color:inherit; padding:10px 12px; border-radius:8px }
    button{ background:var(--accent); color:#052026; border:none; padding:10px 14px; border-radius:10px; cursor:pointer; font-weight:600 }
    #composeBtn{ position:fixed; right:18px; bottom:18px; background:#0ea5a4; color:#042226; padding:10px 14px; border-radius:999px; box-shadow:0 8px 24px rgba(2,6,23,0.5); display:none }
    h2{ font-size:18px; margin:0 8px 0 0 }
    canvas{ background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border-radius:12px; box-shadow: 0 8px 28px rgba(2,6,23,0.6); }
    #graphTitle{ margin:8px 0 12px 0; color:var(--muted) }
  </style>
</head>

<body>

<div class="panel">
  <div class="controls" id="controls">
    <h2>Semantic-Aware Adaptive GF(3) Communication</h2>
    <div style="flex:1"></div>
    <input id="msg" placeholder="Enter message" type="text" style="min-width:360px">
    <input id="err" type="number" step="0.05" value="0.1" style="width:100px">
    <button id="sendBtn" onclick="send()">Send</button>
  </div>

  <h3 id="graphTitle">Accuracy vs Channel Error Rate</h3>
  <div style="width:100%;">
    <canvas id="chart"></canvas>
  </div>
</div>

<button id="composeBtn" title="Compose new message">Compose</button>

<script>
let chart;

async function send() {
  const msg = msgInput.value;
  const err = errInput.value;

  const res = await fetch("/api/send", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: msg, error_rate: err })
  });

  await res.json();

  // Alert user and hide non-graph UI so client shows only the graph
  alert('Message sent to server');
  msgInput.value = "";

  // Hide controls, show a compose button to re-enable inputs
  const controls = document.getElementById('controls');
  const compose = document.getElementById('composeBtn');
  if (controls) controls.style.display = 'none';
  if (compose) compose.style.display = 'inline-block';
  const title = document.getElementById('graphTitle');
  if (title) title.style.marginTop = '12px';

  // Load graph for the sent message
  loadGraph(msg);
}

async function loadGraph(msg) {
  const res = await fetch(`/api/error-graph?message=${encodeURIComponent(msg)}`);
  const data = await res.json();

  if (chart) chart.destroy();

  const ctx = chartCanvas.getContext("2d");

  // Gradient color
  const gradient = ctx.createLinearGradient(0, 0, 0, 400);
  gradient.addColorStop(0, "rgba(75,192,192,0.6)");
  gradient.addColorStop(1, "rgba(75,192,192,0.05)");

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: data.map(d => d.error_rate),
      datasets: [{
        label: "Accuracy vs Channel Error Rate",
        data: data.map(d => d.accuracy),
        borderColor: "rgba(75,192,192,1)",
        backgroundColor: gradient,
        borderWidth: 3,
        fill: true,
        tension: 0.4,
        pointRadius: 5,
        pointHoverRadius: 7,
        pointBackgroundColor: "#fff",
        pointBorderWidth: 2
      }]
    },

    options: {
      responsive: true,
      animation: {
        duration: 1200,
        easing: "easeInOutQuart"
      },

      plugins: {
        legend: {
          labels: {
            font: {
              size: 14
            }
          }
        },

        tooltip: {
          backgroundColor: "#222",
          titleFont: { size: 14 },
          bodyFont: { size: 13 },
          padding: 10,
          cornerRadius: 6
        }
      },

      scales: {
        x: {
          title: {
            display: true,
            text: "Channel Error Rate",
            font: { size: 14 }
          },
          grid: {
            color: "rgba(0,0,0,0.05)"
          }
        },

        y: {
          min: 0,
          max: 1,
          title: {
            display: true,
            text: "Accuracy",
            font: { size: 14 }
          },
          grid: {
            color: "rgba(0,0,0,0.05)"
          }
        }
      }
    }
  });
}

// DOM references
const msgInput = document.getElementById("msg");
const errInput = document.getElementById("err");
const chartCanvas = document.getElementById("chart");

const composeBtn = document.getElementById('composeBtn');
composeBtn.addEventListener('click', ()=>{
  const controls = document.getElementById('controls');
  if (controls) controls.style.display = 'flex';
  composeBtn.style.display = 'none';
  msgInput.focus();
});
</script>

</body>
</html>
