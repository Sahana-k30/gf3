<!DOCTYPE html>
<html>
<head>
  <title>Semantic-Aware Adaptive GF(3) Communication</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    .semantic {
      color: orange;
      white-space: pre-line;
      font-weight: bold;
    }
    .normal {
      color: black;
      white-space: pre-line;
    }

    canvas {
      background: #ffffff;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<h2>Semantic-Aware Adaptive GF(3) Communication</h2>

<input id="msg" placeholder="Enter message" size="50">
<input id="err" type="number" step="0.05" value="0.1">
<button onclick="send()">Send</button>

<hr>

<p><b>Output Mode:</b> <span id="mode"></span></p>
<p><b>Received Output:</b></p>
<div id="out" class="normal"></div>

<p><b>CRC:</b> <span id="crc"></span></p>
<p><b>Confidence:</b> <span id="conf"></span></p>
<p><b>Adaptive Level:</b> <span id="level"></span></p>

<hr>

<h3>Accuracy vs Channel Error Rate</h3>
<div style="width:900px;max-width:100%;">
  <canvas id="chart"></canvas>
</div>

<script>
let chart;

async function send() {
  const msg = msgInput.value;
  const err = errInput.value;

  const res = await fetch("/api/send", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: msg, error_rate: err })
  });

  const data = await res.json();

  // 🔥 SEMANTIC-AWARE DISPLAY
  out.innerText = data.display;

  if (data.mode === "SEMANTIC") {
    out.className = "semantic";
  } else {
    out.className = "normal";
  }

  mode.innerText = data.mode;
  crc.innerText = data.crc_status;
  conf.innerText = data.confidence;
  level.innerText = data.adaptive_level;

  loadGraph(msg);
}

async function loadGraph(msg) {
  const res = await fetch(`/api/error-graph?message=${encodeURIComponent(msg)}`);
  const data = await res.json();

  if (chart) chart.destroy();

  const ctx = chartCanvas.getContext("2d");

  // Gradient color
  const gradient = ctx.createLinearGradient(0, 0, 0, 400);
  gradient.addColorStop(0, "rgba(75,192,192,0.6)");
  gradient.addColorStop(1, "rgba(75,192,192,0.05)");

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: data.map(d => d.error_rate),
      datasets: [{
        label: "Accuracy vs Channel Error Rate",
        data: data.map(d => d.accuracy),
        borderColor: "rgba(75,192,192,1)",
        backgroundColor: gradient,
        borderWidth: 3,
        fill: true,
        tension: 0.4,
        pointRadius: 5,
        pointHoverRadius: 7,
        pointBackgroundColor: "#fff",
        pointBorderWidth: 2
      }]
    },

    options: {
      responsive: true,
      animation: {
        duration: 1200,
        easing: "easeInOutQuart"
      },

      plugins: {
        legend: {
          labels: {
            font: {
              size: 14
            }
          }
        },

        tooltip: {
          backgroundColor: "#222",
          titleFont: { size: 14 },
          bodyFont: { size: 13 },
          padding: 10,
          cornerRadius: 6
        }
      },

      scales: {
        x: {
          title: {
            display: true,
            text: "Channel Error Rate",
            font: { size: 14 }
          },
          grid: {
            color: "rgba(0,0,0,0.05)"
          }
        },

        y: {
          min: 0,
          max: 1,
          title: {
            display: true,
            text: "Accuracy",
            font: { size: 14 }
          },
          grid: {
            color: "rgba(0,0,0,0.05)"
          }
        }
      }
    }
  });
}

// DOM references
const msgInput = document.getElementById("msg");
const errInput = document.getElementById("err");
const out = document.getElementById("out");
const mode = document.getElementById("mode");
const crc = document.getElementById("crc");
const conf = document.getElementById("conf");
const level = document.getElementById("level");
const chartCanvas = document.getElementById("chart");
</script>

</body>
</html>
